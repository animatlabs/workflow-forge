name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to NuGet (true/false)'
        required: false
        default: false
        type: boolean
      version:
        description: 'Package version override (e.g. 2.1.0)'
        required: false
        type: string
      sign:
        description: 'Sign packages (true/false)'
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 8.0.x

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Java 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache SonarCloud packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~\sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore WorkflowForge.sln

    - name: Build and Test with SonarCloud
      if: ${{ env.SONAR_TOKEN != '' }}
      run: |
        dotnet sonarscanner begin `
          /k:"animatlabs_workflow-forge" `
          /o:"animatlabs" `
          /d:sonar.token="$env:SONAR_TOKEN" `
          /d:sonar.host.url="https://sonarcloud.io" `
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" `
          /d:sonar.exclusions="**/src/benchmarks/**,**/src/samples/**,**/tests/**,**/docs/**,**/*.js,**/*.css" `
          /d:sonar.coverage.exclusions="**/src/benchmarks/**,**/src/samples/**,**/tests/**" `
          /d:sonar.cpd.exclusions="**/src/benchmarks/**,**/src/samples/**,**/tests/**" `
          /d:sonar.scanner.scanAll=false
        dotnet build WorkflowForge.sln --configuration Release --no-restore
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-net8.trx" --collect:"XPlat Code Coverage" --framework net8.0 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-net10.trx" --collect:"XPlat Code Coverage" --framework net10.0 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-netfx.trx" --framework net48
        dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

    - name: Build and Test (without SonarCloud)
      if: ${{ env.SONAR_TOKEN == '' }}
      run: |
        dotnet build WorkflowForge.sln --configuration Release --no-restore
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-net8.trx" --collect:"XPlat Code Coverage" --framework net8.0 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-net10.trx" --collect:"XPlat Code Coverage" --framework net10.0 -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        dotnet test WorkflowForge.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-netfx.trx" --framework net48

    - name: Publish Sonar links
      if: ${{ always() && env.SONAR_TOKEN != '' }}
      shell: pwsh
      run: |
        $projectKey = "animatlabs_workflow-forge"
        if ("${{ github.event_name }}" -eq "pull_request") {
          $prNumber = "${{ github.event.pull_request.number }}"
          $dashboardUrl = "https://sonarcloud.io/dashboard?id=$projectKey&pullRequest=$prNumber"
          $newCodeUrl = "https://sonarcloud.io/summary/new_code?id=$projectKey&pullRequest=$prNumber"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## SonarCloud`nPR Dashboard: $dashboardUrl`nPR New Code: $newCodeUrl"
        }
        else {
          $dashboardUrl = "https://sonarcloud.io/dashboard?id=$projectKey"
          $newCodeUrl = "https://sonarcloud.io/summary/new_code?id=$projectKey"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## SonarCloud`nBranch Dashboard: $dashboardUrl`nBranch New Code: $newCodeUrl"
        }

    - name: Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: test-results
        path: '**/*.trx'

    - name: Upload coverage reports
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: coverage-reports
        path: '**/TestResults/**/coverage.opencover.xml'

    - name: Pack
      if: github.event_name == 'workflow_dispatch'
      run: |
        $versionArg = @()
        if ("${{ github.event.inputs.version }}") {
          $versionArg = @("-p:PackageVersion=${{ github.event.inputs.version }}")
        }
        dotnet pack WorkflowForge.sln --configuration Release --no-build --output ./packages @versionArg

    - name: Generate CycloneDX SBOM
      if: github.event_name == 'workflow_dispatch'
      run: |
        dotnet tool install --global CycloneDX
        dotnet cyclonedx WorkflowForge.sln -o ./packages --json

    - name: Upload packages
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: nuget-packages
        path: |
          ./packages/*.nupkg
          ./packages/*.snupkg
          ./packages/*.json

  publish:
    needs: build
    runs-on: windows-latest
    environment: nuget-publish
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      attestations: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 8.0.x

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 10.0.x

    - name: Download packages
      uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
      with:
        name: nuget-packages
        path: ./packages

    - name: Sign packages
      if: github.event.inputs.sign == 'true'
      env:
        SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      run: |
        $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
        [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
        Get-ChildItem ./packages -Filter *.nupkg | ForEach-Object {
          dotnet nuget sign $_.FullName --certificate-path cert.pfx --certificate-password $env:SIGNING_CERT_PASSWORD --timestamper http://timestamp.digicert.com
        }
        Get-ChildItem ./packages -Filter *.snupkg | ForEach-Object {
          dotnet nuget sign $_.FullName --certificate-path cert.pfx --certificate-password $env:SIGNING_CERT_PASSWORD --timestamper http://timestamp.digicert.com
        }
        Remove-Item cert.pfx -Force

    - name: Attest NuGet Package Provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecc0c4c32 # v4
      with:
        subject-path: './packages/*.nupkg'

    - name: Attest Symbol Package Provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecc0c4c32 # v4
      with:
        subject-path: './packages/*.snupkg'

    - name: Attest SBOM
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecc0c4c32 # v4
      with:
        subject-path: './packages/bom.json'

    - name: Push to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        Get-ChildItem ./packages -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
        Get-ChildItem ./packages -Filter *.snupkg | ForEach-Object {
          dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
